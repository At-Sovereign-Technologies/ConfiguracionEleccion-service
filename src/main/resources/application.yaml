spring:
  application:
    name: configuracion-eleccion

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/elecciones_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    time-zone: America/Bogota

server:
  port: 8081

grpc:
  server:
    port: ${GRPC_PORT:9090}

logging:
  level:
    root: INFO
    com.selloLegitimo.ConfiguracionEleccion: DEBUG