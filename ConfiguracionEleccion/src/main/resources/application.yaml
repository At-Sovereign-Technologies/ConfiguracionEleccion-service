spring:
  application:
    name: ConfiguracionEleccion
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/elecciones_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    time-zone: America/Bogota
server:
  port: 8080

logging:
  level:
    root: INFO
    com.selloLegitimo.ConfiguracionEleccion: INFO
