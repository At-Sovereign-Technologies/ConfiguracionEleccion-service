services:
  postgres:
    image: postgres:16
    container_name: configuracion-eleccion-postgres
    environment:
      POSTGRES_DB: elecciones_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d elecciones_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  aplicacion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: configuracion-eleccion-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/elecciones_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data: